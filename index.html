<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>weather-app</title>
    <link rel="stylesheet" href="src/styles/styles.scss" />
  </head>
  <body>
    <div id="app">
      <div class="detail-view">
        <!-- Card 2: 3-Day Forecast -->
        <div class="detail-view__card">
          <p class="detail-view__title">Vorhersage für die nächsten 3 Tage:</p>
          <div class="detail-view__3daysForecast">
            <div class="detail-view__3daysForecast__today">
              <div class="detail-view__3daysForecast_today_p">Heute</div>
              <img
                src="https://cdn.weatherapi.com/weather/128x128/day/116.png"
                class="detail-view__daysForecast__today__icon"
              />
              <div class="detail-view__daysForecast__tody__highest">H:25°C</div>
              <div class="detail-view__daysForecast__today__lowest">T:15°C</div>
              <div class="detail-view__daysForecast__today__wind">
                Wind:15.5km/h
              </div>
            </div>
            <div class="detail-view__3daysForecast__tomorrow">
              <div class="detail-view__3daysForecast__tommorow_p">Di</div>
              <img
                src="https://cdn.weatherapi.com/weather/128x128/day/116.png"
                class="detail-view__daysForecast__tommorow__icon"
              />
              <div class="detail-view__daysForecast__tommorow__highest">
                H:25°C
              </div>
              <div class="detail-view__daysForecast__tommorow__lowest">
                T:15°C
              </div>
              <div class="detail-view__daysForecast__tommorow__wind">
                Wind:15.5km/h
              </div>
            </div>

            <div class="detail-view__3daysForecast__overmorrow">
              <div class="detail-view__3daysForecast__overmorow_p">MI</div>
              <img
                src="https://cdn.weatherapi.com/weather/128x128/day/116.png"
                class="detail-view__daysForecast__overmorow__icon"
              />
              <div class="detail-view__daysForecast__overmorow__highest">
                H:25°C
              </div>
              <div class="detail-view__daysForecast__overmorow__lowest">
                T:15°C
              </div>
              <div class="detail-view__daysForecast__overmorow__wind">
                Wind:15.5km/h
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
