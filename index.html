<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>weather-app</title>
    <link rel="stylesheet" href="src/styles/styles.scss" />
  </head>
  <body>
    <div id="app">
      <div class="mini-stats">
        <div class="mini-stat">
          <div class="mini-stat__title">Feuchtigkeit</div>
          <div class="mini-stat__value">38%</div>
        </div>
        <div class="mini-stat">
          <div class="mini-stats__title">Gefühlt</div>
          <div class="mini-stats__value">24.4°C</div>
        </div>
        <div class="mini-stat">
          <div class="mini-stats__title">Sonnenaufgang</div>
          <div class="mini-stats__value">5:30 Uhr</div>
        </div>
        <div class="mini-stat">
          <div class="mini-stats__title">Sonnenuntergang</div>
          <div class="mini-stats__value">22:30 Uhr</div>
        </div>
        <div class="mini-stat">
          <div class="mini-stats__title">Niederschlag</div>
          <div class="mini-stats__value">00mm</div>
        </div>
        <div class="mini-stat">
          <div class="mini-stats__title">UV-Index</div>
          <div class="mini-stats__value">15</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
